description: |
  MagAlpha MA730 absolute magnetic rotary encoder.

  Polls angle over SPI and, depending on the highest active ZMK keymap
  layer, drives either the keyboard world (taps F13/F14, Volume Up/Down)
  or the pointing world (smooth INPUT_REL_WHEEL / INPUT_REL_HWHEEL).
  The per-layer mode table lives in the driver (ma730_input.c).

  Requires SPI mode 3. spi-max-frequency must not exceed the MA730 limit.

compatible: "polarityworks,ma730-input"

include: spi-device.yaml

properties:
  reversal-threshold:
    type: int
    default: 10
    description: |
      Minimum raw-count delta to confirm a direction change. Sub-threshold
      opposing deltas are discarded so detent jitter cannot flip direction.

  scroll-counts-per-unit:
    type: int
    default: 64
    description: |
      Raw encoder counts per emitted wheel unit on the scroll layers.
      The MA730 is 16-bit (65536 counts/rev), so 64 -> ~1024 fine units
      per revolution before the input-processor-scaler divides them down.
      Lower = more sensitive (more wheel units per turn). Must be >= 1.

  key-counts-per-detent:
    type: int
    default: 2731
    description: |
      Raw encoder counts per key tap on the keyboard layers (brightness,
      volume). 65536 / 2731 ~= 24 detents per revolution, i.e. a normal
      encoder feel. Lower = more taps per turn. Must be >= 1.

  scroll-accel-gain:
    type: int
    default: 6
    description: |
      Velocity-based scroll acceleration. The per-poll speed (raw counts
      since the last ~8 ms poll) is multiplied by this gain and added to a
      256-based unity factor, so faster turns scroll proportionally further.
      Set to 0 to disable acceleration (linear scrolling).

  scroll-accel-max:
    type: int
    default: 1024
    description: |
      Upper clamp on the acceleration factor (256 = 1x). 1024 = up to 4x at
      high speed. Only used when scroll-accel-gain > 0.

  invert-scroll:
    type: boolean
    description: |
      Invert VERTICAL wheel direction. By default clockwise rotation scrolls
      DOWN (standard convention); set this to make clockwise scroll up.

  invert-hscroll:
    type: boolean
    description: |
      Invert HORIZONTAL wheel direction. By default clockwise rotation pans
      right.
